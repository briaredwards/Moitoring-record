<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Record – Response to Medication</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #eef4fb;
    padding: 6px;
  }

  .card {
    background: #fff;
    border: 1.5px solid #a8c8e8;
    border-radius: 10px;
    padding: 10px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a3a5c;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #d0e4f4;
  }

  .table-wrap { overflow-x: hidden; }

  .monitor-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
    table-layout: fixed;
  }

  .monitor-table thead th {
    background: #2c6fad;
    color: #fff;
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 6px 3px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
  }

  .monitor-table thead th .unit {
    display: block;
    font-weight: 400;
    font-size: 9.5px;
    opacity: 0.8;
    text-transform: none;
    letter-spacing: 0;
  }

  .monitor-table thead th:first-child { border-radius: 6px 0 0 0; }
  .monitor-table thead th:last-child  { border-radius: 0 6px 0 0; }

  .monitor-table tbody tr {
    border-bottom: 1px solid #e4eef7;
    transition: background 0.15s;
  }
  .monitor-table tbody tr:nth-child(even) { background: #f4f9ff; }
  .monitor-table tbody tr:hover { background: #e8f2fb; }

  .monitor-table tbody td {
    padding: 3px 2px;
    vertical-align: middle;
    text-align: center;
  }

  .monitor-table input {
    width: 100%;
    border: 1px solid #b8d0e8;
    border-radius: 4px;
    padding: 4px 2px;
    font-size: 11.5px;
    color: #1a3a5c;
    background: #fff;
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .monitor-table input:focus {
    outline: none;
    border-color: #2c6fad;
    box-shadow: 0 0 0 2px rgba(44,111,173,0.15);
  }

  /* Hide spinners by default, show on hover/focus */
  .monitor-table input[type=number] { -moz-appearance: textfield; }
  .monitor-table input[type=number]::-webkit-inner-spin-button,
  .monitor-table input[type=number]::-webkit-outer-spin-button { opacity: 0; transition: opacity 0.2s; }
  .monitor-table input[type=number]:hover::-webkit-inner-spin-button,
  .monitor-table input[type=number]:focus::-webkit-inner-spin-button,
  .monitor-table input[type=number]:hover::-webkit-outer-spin-button,
  .monitor-table input[type=number]:focus::-webkit-outer-spin-button { opacity: 1; }

  .monitor-table input.out-of-range {
    border-color: #e05c5c;
    background: #fff5f5;
    color: #c0392b;
    font-weight: 600;
  }

  .col-time   { width: 9%; }
  .col-hr     { width: 7%; }
  .col-spo2   { width: 7%; }
  .col-bp     { width: 12%; }
  .col-map    { width: 7%; }
  .col-rr     { width: 7%; }
  .col-etco2  { width: 8%; }
  .col-bis    { width: 7%; }
  .col-prop   { width: 10%; }
  .col-remi   { width: 10%; }
  .col-action { width: 4%; }

  .time-input { font-weight: 600; }

  .btn-delete {
    border: none;
    background: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: #aaa;
    transition: all 0.15s;
  }
  .btn-delete:hover { background: #fde8e8; color: #e05c5c; }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .btn-add {
    background: #2c6fad;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover { background: #1a5490; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .btn-clear {
    background: transparent;
    color: #888;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { background: #fde8e8; border-color: #e05c5c; color: #e05c5c; }

  .row-count {
    font-size: 12px;
    color: #7a9bbf;
    font-weight: 500;
  }

  /* Completely hidden output for JotForm */
  #outputField {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">Monitoring Record – Response to Medication</div>

  <div class="table-wrap">
    <table class="monitor-table">
      <thead>
        <tr>
          <th class="col-time">Time</th>
          <th class="col-hr">HR<span class="unit">60–100</span></th>
          <th class="col-spo2">SPO2<span class="unit">&gt;95%</span></th>
          <th class="col-bp">BP<span class="unit">sys/dia</span></th>
          <th class="col-map">MAP<span class="unit">70–105</span></th>
          <th class="col-rr">RR<span class="unit">12–20</span></th>
          <th class="col-etco2">EtCO2<span class="unit">35–45</span></th>
          <th class="col-bis">BIS<span class="unit">40–60</span></th>
          <th class="col-prop">Prop.<span class="unit">mcg/mL</span></th>
          <th class="col-remi">Remi.<span class="unit">ng/mL</span></th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="monitorBody"></tbody>
    </table>
  </div>

  <div class="footer">
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-add" onclick="addRow()">＋ Add Row</button>
    </div>
    <span class="row-count" id="rowCount">0 rows</span>
  </div>
</div>

<textarea id="outputField" name="q_monitoringRecord"></textarea>

<script>
  const RANGES = {
    hr:    { min: 60,  max: 100 },
    spo2:  { min: 95,  max: 100 },
    map:   { min: 70,  max: 105 },
    rr:    { min: 12,  max: 20  },
    etco2: { min: 35,  max: 45  },
    bis:   { min: 40,  max: 60  },
  };

  let rows = [];
  let nextId = 1;

  function parseTime(str) {
    if (!str) return null;
    const clean = str.replace(':', '');
    if (clean.length < 3 || clean.length > 4) return null;
    const h = parseInt(clean.slice(0, clean.length - 2));
    const m = parseInt(clean.slice(-2));
    if (isNaN(h) || isNaN(m) || h > 23 || m > 59) return null;
    return h * 60 + m;
  }

  function formatTime(totalMins) {
    const norm = ((totalMins % 1440) + 1440) % 1440;
    return String(Math.floor(norm / 60)).padStart(2,'0') + ':' + String(norm % 60).padStart(2,'0');
  }

  function getLastTime() {
    for (let i = rows.length - 1; i >= 0; i--) {
      const t = parseTime(rows[i].time);
      if (t !== null) return t;
    }
    return null;
  }

  function addRow() {
    const lastTime = getLastTime();
    const newTime  = lastTime !== null ? formatTime(lastTime + 5) : '';
    let newRow;

    if (rows.length > 0) {
      const prev = rows[rows.length - 1];
      // Duplicate previous values but give fresh id and new time
      newRow = {
        id: nextId++,
        time: newTime,
        hr:           prev.hr,
        spo2:         prev.spo2,
        bp:           prev.bp,
        map:          prev.map,
        rr:           prev.rr,
        etco2:        prev.etco2,
        bis:          prev.bis,
        propofol:     prev.propofol,
        remifentanil: prev.remifentanil,
      };
    } else {
      newRow = { id: nextId++, time: newTime, hr:'', spo2:'', bp:'', map:'', rr:'', etco2:'', bis:'', propofol:'', remifentanil:'' };
    }

    rows.push(newRow);
    renderTable();
    updateOutput();

    setTimeout(() => {
      const tr = document.querySelector(`tr[data-id="${newRow.id}"]`);
      if (!tr) return;
      const focus = newTime
        ? tr.querySelector('input[data-field="hr"]')
        : tr.querySelector('.time-input');
      focus && focus.focus();
    }, 40);
  }

  function deleteRow(id) {
    rows = rows.filter(r => r.id !== id);
    renderTable();
    updateOutput();
  }

  function clearAll() {
    if (!rows.length) return;
    if (confirm('Clear all rows?')) { rows = []; renderTable(); updateOutput(); }
  }

  function updateField(id, field, value) {
    const row = rows.find(r => r.id === id);
    if (!row) return;
    row[field] = value;
    updateOutput();
    if (RANGES[field]) applyRange(id, field, value);
  }

  function applyRange(id, field, value) {
    const input = document.querySelector(`tr[data-id="${id}"] input[data-field="${field}"]`);
    if (!input) return;
    if (value === '') { input.classList.remove('out-of-range'); return; }
    const n = parseFloat(value);
    const { min, max } = RANGES[field];
    input.classList.toggle('out-of-range', isNaN(n) || n < min || n > max);
  }

  function esc(v) {
    return (v === undefined || v === null) ? '' : String(v).replace(/"/g,'&quot;');
  }

  function renderTable() {
    const tbody = document.getElementById('monitorBody');
    tbody.innerHTML = '';
    rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.dataset.id = row.id;
      tr.innerHTML = `
        <td><input class="time-input" type="text" data-field="time"
          value="${esc(row.time)}" placeholder="HH:MM" maxlength="5"
          oninput="onTimeInput(${row.id},this)"
          onblur="onTimeBlur(${row.id},this)"></td>
        <td><input type="number" data-field="hr" value="${esc(row.hr)}"
          min="0" max="300" step="1" placeholder="—"
          oninput="updateField(${row.id},'hr',this.value)"></td>
        <td><input type="number" data-field="spo2" value="${esc(row.spo2)}"
          min="0" max="100" step="1" placeholder="—"
          oninput="updateField(${row.id},'spo2',this.value)"></td>
        <td><input type="text" data-field="bp" value="${esc(row.bp)}"
          placeholder="120/80" maxlength="12"
          oninput="updateField(${row.id},'bp',this.value)"></td>
        <td><input type="number" data-field="map" value="${esc(row.map)}"
          min="0" max="200" step="1" placeholder="—"
          oninput="updateField(${row.id},'map',this.value)"></td>
        <td><input type="number" data-field="rr" value="${esc(row.rr)}"
          min="0" max="60" step="1" placeholder="—"
          oninput="updateField(${row.id},'rr',this.value)"></td>
        <td><input type="number" data-field="etco2" value="${esc(row.etco2)}"
          min="0" max="100" step="1" placeholder="—"
          oninput="updateField(${row.id},'etco2',this.value)"></td>
        <td><input type="number" data-field="bis" value="${esc(row.bis)}"
          min="0" max="100" step="1" placeholder="—"
          oninput="updateField(${row.id},'bis',this.value)"></td>
        <td><input type="number" data-field="propofol" value="${esc(row.propofol)}"
          min="0" max="20" step="0.1" placeholder="—"
          oninput="updateField(${row.id},'propofol',this.value)"></td>
        <td><input type="number" data-field="remifentanil" value="${esc(row.remifentanil)}"
          min="0" max="20" step="0.1" placeholder="—"
          oninput="updateField(${row.id},'remifentanil',this.value)"></td>
        <td><button class="btn-delete" onclick="deleteRow(${row.id})" title="Delete">✕</button></td>
      `;
      tbody.appendChild(tr);
      Object.keys(RANGES).forEach(f => { if (row[f] !== '') applyRange(row.id, f, row[f]); });
    });
    document.getElementById('rowCount').textContent =
      rows.length === 0 ? '0 rows' : `${rows.length} row${rows.length !== 1 ? 's' : ''}`;
  }

  function onTimeInput(id, input) {
    let v = input.value.replace(/[^0-9:]/g, '');
    if (v.length === 2 && !v.includes(':')) { v += ':'; input.value = v; }
    const row = rows.find(r => r.id === id);
    if (row) { row.time = v; updateOutput(); }
  }

  function onTimeBlur(id, input) {
    const parsed = parseTime(input.value);
    const row = rows.find(r => r.id === id);
    if (parsed !== null && row) {
      const formatted = formatTime(parsed);
      input.value = formatted;
      row.time = formatted;
      updateOutput();
    }
  }

  function updateOutput() {
    const f = v => (v !== '' && v !== undefined) ? v : '-';
    const lines = rows.map((r, i) =>
      `Row ${i+1}: Time=${f(r.time)} | HR=${f(r.hr)} | SPO2=${f(r.spo2)} | BP=${f(r.bp)} | MAP=${f(r.map)} | RR=${f(r.rr)} | EtCO2=${f(r.etco2)} | BIS=${f(r.bis)} | Propofol=${f(r.propofol)} | Remifentanil=${f(r.remifentanil)}`
    ).join('\n');

    document.getElementById('outputField').value = lines;

    try {
      const jf = window.parent.document.querySelector('input[name="q_monitoringRecord"],textarea[name="q_monitoringRecord"]');
      if (jf) jf.value = lines;
    } catch(e) {}
    try { window.parent.postMessage({ type: 'monitoringRecord', data: lines }, '*'); } catch(e) {}
  }

  // Start with one blank row
  addRow();
</script>
</body>
</html>
